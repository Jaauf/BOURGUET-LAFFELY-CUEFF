name: Trivy Scan (Docker Compose + Images)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '44 3 * * 3'  # Tous les mercredis à 3h44

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-scan:
    name: Scan Docker Compose and Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Docker Compose Configuration
        run: |
          trivy config compose.yml


      - name: Scan Docker Compose Configuration
        run: |
          # Scanner tous les fichiers YAML du répertoire
          trivy config --format table .

      - name: Scan Images in Docker Compose
        run: |
          trivy image node:24
          trivy image postgres
          trivy image nginx:alpine

      - name: Build Docker Image (if needed)
        run: |
          docker compose -f compose.yml build


# ansible.cfg — Configuration Ansible du projet
# Ce fichier est automatiquement lu par Ansible s'il est dans le répertoire
# depuis lequel on lance ansible-playbook.

[defaults]
# Inventaire par défaut
inventory           = inventory/hosts.ini

# Roles path (local d'abord, puis galaxy)
roles_path          = roles

# Réduire le bruit en sortie
stdout_callback     = yaml
bin_ansible_callbacks = true

# Ne pas créer de fichiers .retry
retry_files_enabled = false

# Fact caching (accélère les runs répétés)
gathering           = smart
fact_caching        = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

# Timeout SSH (pertinent pour déploiement distant)
timeout             = 30

# Nombre de forks parallèles (1 pour local, augmenter pour multi-hosts)
forks               = 5

[privilege_escalation]
become              = true
become_method       = sudo
become_ask_pass     = false   # Mettre true si pas de NOPASSWD dans sudoers

[ssh_connection]
pipelining          = true    # Accélère l'exécution via SSH
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new

---
- name: Déploiement complet de la stack sécurisée
  hosts: localhost
  connection: local
  become: true

  vars:
    project_dir: "/Open-source-M2-cyber-2026"

  tasks:

    # ── Prérequis : Docker ───────────────────────────────────────────────
    - name: Vérifier si Docker est installé
      command: docker --version
      register: docker_check
      ignore_errors: true

    - name: Installer Docker si absent
      when: docker_check.rc != 0
      block:
        - name: Télécharger le script d'installation Docker
          get_url:
            url: https://get.docker.com
            dest: /tmp/get-docker.sh
            mode: '0755'
        - name: Exécuter le script d'installation Docker
          command: sh /tmp/get-docker.sh

    - name: Vérifier si Docker Compose est disponible
      command: docker compose version
      register: compose_check
      ignore_errors: true

    - name: Installer le plugin Docker Compose si absent
      when: compose_check.rc != 0
      apt:
        name: docker-compose-plugin
        state: present
        update_cache: true

    # ── Git : cloner ou mettre à jour le repo ───────────────────────────
    - name: Vérifier si le repo existe déjà
      stat:
        path: "{{ project_dir }}/.git"
      register: repo_stat

    - name: Cloner le dépôt si absent
      when: not repo_stat.stat.exists
      git:
        repo: "https://github.com/ynov-cd/Open-source-M2-cyber-2026"
        dest: "{{ project_dir }}"
        version: main

    - name: Mettre à jour le dépôt si présent
      when: repo_stat.stat.exists
      command:
        cmd: git pull
        chdir: "{{ project_dir }}"

    # ── Déploiement stack applicative ───────────────────────────────────
    - name: Démarrer la stack applicative
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        files:
          - compose.yml
        state: present
        pull: missing

    - name: Attendre que Traefik soit healthy
      command: docker inspect --format="{{ '{{.State.Health.Status}}' }}" traefik
      register: traefik_health
      until: traefik_health.stdout == "healthy" or traefik_health.stdout == "running"
      retries: 10
      delay: 5

    # ── Déploiement stack sécurité ───────────────────────────────────────
    - name: Démarrer la stack de sécurité
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}/security"
        files:
          - docker-compose.security.yml
        state: present
        pull: missing

    # ── Initialisation sécurité OpenSearch ──────────────────────────────
    - name: Attendre que wazuh-indexer soit disponible (port 9200)
      wait_for:
        host: localhost
        port: 9200
        timeout: 120
        delay: 10

    - name: Initialiser la sécurité OpenSearch via securityadmin.sh
      command: >
        docker exec wazuh-indexer bash -c
        "export JAVA_HOME=/usr/share/wazuh-indexer/jdk &&
        export PATH=$JAVA_HOME/bin:$PATH &&
        bash /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh
        -cd /usr/share/wazuh-indexer/opensearch-security/
        -icl -p 9200
        -cacert /usr/share/wazuh-indexer/certs/root-ca.pem
        -cert /usr/share/wazuh-indexer/certs/admin.pem
        -key /usr/share/wazuh-indexer/certs/admin-key.pem
        -nhnv"
      register: securityadmin_result
      retries: 5
      delay: 15
      until: securityadmin_result.rc == 0

    - name: Afficher la sortie de securityadmin.sh
      debug:
        msg: "{{ securityadmin_result.stdout_lines }}"

    - name: Vérifier que la sécurité OpenSearch est initialisée
      uri:
        url: "https://localhost:9200/_cluster/health"
        method: GET
        user: admin
        password: admin
        validate_certs: false
        status_code: 200
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: Afficher le statut du cluster OpenSearch
      debug:
        msg: "Cluster OpenSearch status : {{ health_check.json.status }}"

    # ── Vérification finale ──────────────────────────────────────────────
    - name: Lister tous les conteneurs en cours
      command: docker compose ps
      args:
        chdir: "{{ project_dir }}"
      register: containers_status

    - name: Afficher le statut des conteneurs
      debug:
        msg: "{{ containers_status.stdout }}"

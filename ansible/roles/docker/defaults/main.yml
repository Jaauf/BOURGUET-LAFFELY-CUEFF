---
# roles/docker/defaults/main.yml
# Variables par défaut — surchargeable depuis group_vars ou host_vars

docker_apt_keyring_path: "/etc/apt/keyrings/docker.asc"
docker_gpg_url: "https://download.docker.com/linux/ubuntu/gpg"
docker_repo_channel: "stable"

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Utilisateurs à ajouter au groupe docker (laisser vide pour ne rien faire)
docker_users: []
# Exemple : docker_users: ["ubuntu", "deploy"]

---
# roles/docker/tasks/main.yml

# ── Dépendances système ───────────────────────────────────────────────────────
- name: docker | Installer les paquets prérequis APT
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  tags: docker

# ── Clé GPG Docker ───────────────────────────────────────────────────────────
- name: docker | Créer le répertoire des clés APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: docker

- name: docker | Télécharger la clé GPG officielle Docker
  ansible.builtin.get_url:
    url: "{{ docker_gpg_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    mode: "0644"
    force: false          # idempotent : ne retélécharge pas si déjà présente
  tags: docker

# ── Dépôt APT Docker ─────────────────────────────────────────────────────────
- name: docker | Ajouter le dépôt APT officiel Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by={{ docker_apt_keyring_path }}]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} {{ docker_repo_channel }}
    state: present
    filename: docker
    update_cache: true
  tags: docker

# ── Installation Docker Engine ────────────────────────────────────────────────
- name: docker | Installer Docker Engine et les plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
  notify: restart docker
  tags: docker

# ── Service Docker ────────────────────────────────────────────────────────────
- name: docker | Activer et démarrer le service Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  ignore_errors: true   # WSL2 sans systemd : ne pas bloquer le playbook
  tags: docker

# ── Groupe docker (accès sans sudo) ──────────────────────────────────────────
- name: docker | Ajouter les utilisateurs au groupe docker
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0
  tags: docker

# ── Validation ───────────────────────────────────────────────────────────────
- name: docker | Vérifier que docker CLI répond
  ansible.builtin.command: docker --version
  register: _docker_version
  changed_when: false
  tags: docker

- name: docker | Vérifier que docker compose (plugin) répond
  ansible.builtin.command: docker compose version
  register: _compose_version
  changed_when: false
  tags: docker

- name: docker | Afficher les versions installées
  ansible.builtin.debug:
    msg:
      - "{{ _docker_version.stdout }}"
      - "{{ _compose_version.stdout }}"
  tags: docker

# ── Réseau partagé Traefik ────────────────────────────────────────────────────
- name: docker | Créer le réseau Docker partagé '{{ docker_shared_network }}'
  community.docker.docker_network:
    name: "{{ docker_shared_network }}"
    state: present
    driver: bridge
  tags: docker

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Frontend</h1>
        <div class="controls">
            <input type="text" id="args" placeholder="Enter ls arguments">
            <button id="fcetchModules">List Node modules</button>
        </div>
        <div class="output" id="containerOutput"></div>

        <h2>Database Requests</h2>
        <div class="controls">
            <input type="text" id="sort" placeholder="Enter ASC or DESC">
            <button id="fetchData">Fetch Data</button>
        </div>
        <div class="output" id="dataOutput"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>

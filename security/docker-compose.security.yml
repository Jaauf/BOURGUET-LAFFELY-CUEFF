networks:
  traefik-public:
    external: true
  security-net:
    driver: bridge

services:

  # ── Falco : détection comportementale ────────────────────────────────────
  falco:
    image: falcosecurity/falco-no-driver:latest
    container_name: falco
    restart: unless-stopped
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - ./falco/falco_rules.yml:/etc/falco/rules.d/local_rules.yml:ro
      - falco-logs:/var/log/falco
    environment:
      - HOST_ROOT=/host
      - FALCO_BPF_PROBE=""
    command: >
      /usr/bin/falco
      --pidfile=/var/run/falco.pid
      -pk
      -o "log_syslog=false"
      -o "file_output.enabled=true"
      -o "file_output.filename=/var/log/falco/falco.log"
    networks:
      - security-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Suricata : IDS réseau ─────────────────────────────────────────────────
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/etc/suricata/rules:ro
      - suricata-logs:/var/log/suricata
    command: >
      -c /etc/suricata/suricata.yaml
      --af-packet
      -v
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ── Wazuh Manager ─────────────────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: wazuh-manager
    restart: unless-stopped
    hostname: wazuh-manager
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword123!
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-etc:/var/ossec/etc
      - falco-logs:/var/log/falco:ro
      - suricata-logs:/var/log/suricata:ro
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    networks:
      - security-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Wazuh Indexer (OpenSearch) ────────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: wazuh-indexer
    restart: unless-stopped
    hostname: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    ports:
      - "9200:9200"
    networks:
      - security-net
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ── Wazuh Dashboard ───────────────────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: wazuh-dashboard
    restart: unless-stopped
    hostname: wazuh-dashboard
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword123!
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    ports:
      - "5601:5601"
    networks:
      - security-net
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Shuffle : SOAR ────────────────────────────────────────────────────────
  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:latest
    container_name: shuffle-frontend
    restart: unless-stopped
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    ports:
      - "3001:80"
      - "3443:443"
    networks:
      - security-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:latest
    container_name: shuffle-backend
    restart: unless-stopped
    environment:
      - DATASTORE_EMULATOR_HOST=shuffle-database:8000
      - SHUFFLE_APP_HOTLOAD_FOLDER=./shuffle-apps
      - SHUFFLE_FILE_LOCATION=./shuffle-files
      - BACKEND_HOSTNAME=shuffle-backend
      - ORG_ID=Shuffle
      - SHUFFLE_DEFAULT_USERNAME=admin
      - SHUFFLE_DEFAULT_PASSWORD=password
      - SHUFFLE_DEFAULT_APIKEY=mysecretkey
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - shuffle-data:/shuffle-files
    ports:
      - "5001:5001"
    networks:
      - security-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  falco-logs:
  suricata-logs:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-etc:
  wazuh-indexer-data:
  shuffle-data:
